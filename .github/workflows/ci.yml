name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Lint, Typecheck, Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "25"
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Run Checks
        run: npm run ci
